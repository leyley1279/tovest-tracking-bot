version: "3.9"

services:
  tovest-bot:
    build: .
    container_name: tovest_tracking_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persist the SQLite database and logs outside the container
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      # Override DB and log paths to use the mounted volumes
      - DB_PATH=/app/data/tracking.db
